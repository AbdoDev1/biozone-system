{# يتغير لونه بعد الإضافة. hx-target="this" + hx-swap="outerHTML" عشان يستبدل نفسه #}
{% if in_cart %}
  <form hx-post="{% url 'orders:cart_add' unit.pk %}"
        hx-target="this"
        hx-swap="outerHTML">
    {% csrf_token %}
    <button type="submit"
            class="mt-2 w-full bg-green-600 hover:bg-green-700 text-white text-xs py-2 rounded-lg transition flex items-center justify-center gap-1">
      ✓ تمت الإضافة
    </button>
  </form>
{% else %}
  <form hx-post="{% url 'orders:cart_add' unit.pk %}"
        hx-target="this"
        hx-swap="outerHTML">
    {% csrf_token %}
    <button type="submit"
            class="mt-2 w-full bg-blue-600 hover:bg-blue-700 text-white text-xs py-2 rounded-lg transition flex items-center justify-center gap-1">
      🛒 أضف للسلة
    </button>
  </form>
{% endif %}
