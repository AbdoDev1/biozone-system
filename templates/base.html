<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Biozone{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    {% if request.user.is_authenticated %}
    <nav class="bg-white shadow px-6 py-3 flex justify-between items-center">
        <span class="font-bold text-blue-700">Biozone</span>
        <div class="flex items-center gap-4 text-sm">
            <span class="text-gray-500">{{ request.user.username }}</span>
            <a href="{% url 'accounts:logout' %}"
               class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg transition">
                خروج
            </a>
        </div>
    </nav>
    {% endif %}
    ...
    {% block content %}{% endblock %}
</body>
</html>
