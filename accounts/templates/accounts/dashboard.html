{% extends 'base.html' %}

{% block title %}الرئيسية — Biozone{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md text-center">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">أهلاً {{ request.user.username }}</h2>
        <p class="text-gray-500 mb-6">مرحباً بك في نظام Biozone</p>
        <a href="{% url 'accounts:logout' %}"
           class="inline-block bg-red-500 hover:bg-red-600 text-white font-semibold px-6 py-2 rounded-lg transition">
            تسجيل الخروج
        </a>
    </div>
</div>
{% endblock %}
