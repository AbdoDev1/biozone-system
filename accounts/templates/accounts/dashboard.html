{% extends 'base.html' %}
{% block title %}حسابي — Biozone{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md text-center">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">أهلاً {{ request.user.username }}</h2>
        <p class="text-gray-500 mb-6">مرحباً بك في Biozone</p>
        <div class="space-y-3">
            <a href="/products/" class="block bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg transition">
                تصفح المنتجات
            </a>
            <a href="{% url 'accounts:logout' %}" class="block bg-red-500 hover:bg-red-600 text-white font-semibold px-6 py-2 rounded-lg transition">
                تسجيل الخروج
            </a>
        </div>
    </div>
</div>
{% endblock %}
