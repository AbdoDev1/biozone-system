{% extends 'base.html' %}

{% block title %}تسجيل الدخول — Biozone{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-700">Biozone</h1>
            <p class="text-gray-500 mt-1">نظام إدارة المستلزمات الطبية</p>
        </div>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}"
                       name="{{ field.html_name }}"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       {% if field.value %}value="{{ field.value }}"{% endif %}>
                {% if field.errors %}
                <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
                دخول
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            مش عندك حساب؟
            <a href="{% url 'accounts:register' %}" class="text-blue-600 hover:underline">سجل هنا</a>
        </p>
    </div>
</div>
{% endblock %}
